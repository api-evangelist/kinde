naftiko: 1.0.0-alpha2
info:
  label: Kinde Management API — API Keys
  description: 'Kinde Management API — API Keys. Manages programmatic API keys issued by a Kinde business
    (used for both server-to-server access and for routing AI agents through the MCP server):
    list/create/get/delete/rotate/verify API keys. Self-contained Naftiko capability covering one Kinde
    business surface.'
  tags:
  - Kinde
  - API Keys
  - Authentication
  - Secrets
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    KINDE_SUBDOMAIN: KINDE_SUBDOMAIN
    KINDE_ACCESS_TOKEN: KINDE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: kinde-api-keys
    baseUri: https://{KINDE_SUBDOMAIN}.kinde.com/api/v1
    description: Kinde Management API — API Keys business capability. Self-contained, no shared references.
    resources:
    - name: api_keys
      path: /api_keys
      operations:
      - name: getApiKeys
        method: GET
        description: List API keys in the environment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_size
          in: query
          type: integer
        - name: key_type
          in: query
          type: string
      - name: createApiKey
        method: POST
        description: Issue a new API key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: api_key
      path: /api_keys/{key_id}
      operations:
      - name: getApiKey
        method: GET
        description: Get an API key's metadata by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key_id
          in: path
          type: string
          required: true
      - name: deleteApiKey
        method: DELETE
        description: Revoke and delete an API key.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key_id
          in: path
          type: string
          required: true
    - name: api_keys-verify
      path: /api_keys/verify
      operations:
      - name: verifyApiKey
        method: POST
        description: Validate that a supplied API key string is active and authorized.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
