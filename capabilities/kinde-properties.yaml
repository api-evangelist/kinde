naftiko: 1.0.0-alpha2
info:
  label: Kinde Management API — Properties
  description: 'Kinde Management API — Properties. Manages custom properties (metadata fields) defined on
    users, organizations, and applications, plus the property categories they group under: list/create/
    update/delete properties and categories. Self-contained Naftiko capability covering one Kinde business
    surface.'
  tags:
  - Kinde
  - Properties
  - Metadata
  - Custom Fields
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    KINDE_SUBDOMAIN: KINDE_SUBDOMAIN
    KINDE_ACCESS_TOKEN: KINDE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: kinde-properties
    baseUri: https://{KINDE_SUBDOMAIN}.kinde.com/api/v1
    description: Kinde Management API — Properties business capability. Self-contained, no shared references.
    resources:
    - name: properties
      path: /properties
      operations:
      - name: getProperties
        method: GET
        description: List defined custom properties.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_size
          in: query
          type: integer
      - name: createProperty
        method: POST
        description: Create a new custom property.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: property
      path: /properties/{property_id}
      operations:
      - name: updateProperty
        method: PUT
        description: Update a custom property's metadata.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: property_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deleteProperty
        method: DELETE
        description: Delete a custom property.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: property_id
          in: path
          type: string
          required: true
    - name: property_categories
      path: /property_categories
      operations:
      - name: getPropertyCategories
        method: GET
        description: List property categories used to group properties.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
      - name: createPropertyCategory
        method: POST
        description: Create a new property category.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
